  "f8": { name: "Traditional White Honey (Gonder) - 1kg", cat: "food", price: Math.round(750 * 1.15), emoji: "🍯", img: "https://images.unsplash.com/photo-1471943311424-646960669fba?w=400&auto=format&fit=crop&q=60", desc: "Rare high-altitude smooth white honey known for its health values." },
  "f9": { name: "Buna Board Espresso Coffee Beans - 1kg", cat: "food", price: Math.round(590 * 1.15), emoji: "🫘", img: "https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=400&auto=format&fit=crop&q=60", desc: "Export grade medium-roasted whole bean specialty coffee from Yirgacheffe." },
  "f10": { name: "Shuro Powder (Spiced Chickpea) - 1kg", cat: "food", price: Math.round(280 * 1.15), emoji: "🥘", img: "https://images.unsplash.com/photo-1546833999-b9f581a1996d?w=400&auto=format&fit=crop&q=60", desc: "Meticulously mixed authentic homemade spiced chickpea powder for Shiro Wat." },

  "e1": { name: "Beecaro 160W Bluetooth Bass Speaker", cat: "electronics", price: Math.round(16500 * 1.15), emoji: "🔊", img: "https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=400&auto=format&fit=crop&q=60", desc: "Super loud portable active Bluetooth wireless outdoor party sound system." },
  "e2": { name: "Oraimo FreePods 4 Wireless Earbuds", cat: "electronics", price: Math.round(4200 * 1.15), emoji: "🎧", img: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=400&auto=format&fit=crop&q=60", desc: "Original true wireless active noise canceling earbuds with massive playback battery life." },

  "e5": { name: "Xiaomi Redmi Note 13 Pro Charger", cat: "electronics", price: Math.round(1900 * 1.15), emoji: "⚡", img: "https://images.unsplash.com/photo-1622445262465-2481c4574875?w=400&auto=format&fit=crop&q=60", desc: "67W fast charging original adapter with solid Type-C interface wire." },

  // --- SHOES CATEGORY ---
  "s1": { name: "Air Max Classic Retro", cat: "shoes", price: Math.round(4500 * 1.15), emoji: "👟", img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&auto=format&fit=crop&q=60", desc: "Premium sport cushioning sneakers designed for heavy daily walks." },
  "s2": { name: "Executive Leather Loafers", cat: "shoes", price: Math.round(6200 * 1.15), emoji: "👞", img: "https://images.unsplash.com/photo-1533867617858-e7b97e060509?w=400&auto=format&fit=crop&q=60", desc: "Formal breathable structural leather footwear fit for office settings." },

  // --- CLOTHING CATEGORY ---
  "c1": { name: "Classic Cotton Habesha T-Shirt", cat: "clothing", price: Math.round(1200 * 1.15), emoji: "👕", img: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=400&auto=format&fit=crop&q=60", desc: "Lightweight authentic organic breathable cotton graphic blend wear." },

  // --- BEAUTY CATEGORY ---
  "b1": { name: "Hydrating Shea Body Butter", cat: "beauty", price: Math.round(1800 * 1.15), emoji: "🧴", img: "https://images.unsplash.com/photo-1608248597481-496100c8c836?w=400&auto=format&fit=crop&q=60", desc: "Deep rich skin revitalizing butter safe for daily smooth application." }
};

let cart = [];
let currentCategory = 'all';

// Active Categories Map
const categories = {
  "all": "All Products",
  "food": "Food 🌾",
  "electronics": "Electronics 🔌",
  "shoes": "Shoes 👟",
  "clothing": "Clothing 👕",
  "beauty": "Beauty & Care 🧴"
};

// Initial App Mount
window.addEventListener('DOMContentLoaded', () => {
  renderCategories();
  renderProducts();
  updateCartUI();
});

// Category Navigation Rendering
function renderCategories() {
  const bar = document.getElementById('categoriesBar');
  bar.innerHTML = Object.keys(categories).map(key => `
    <button class="cat-pill ${currentCategory === key ? 'active' : ''}" onclick="filterCategory('${key}')">
      ${categories[key]}
    </button>
  `).join('');
}

function filterCategory(catKey) {
  currentCategory = catKey;
  document.getElementById('sectionTitle').innerText = categories[catKey];
  renderCategories();
  renderProducts();
}

// Global Search Filtering Handler
function handleSearch() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  renderProducts(query);
}

// Master Product Grid Engine
function renderProducts(searchQuery = "") {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = "";

  let items = Object.keys(products).map(id => ({ id, ...products[id] }));

  // Apply filters
  if (currentCategory !== 'all') {
    items = items.filter(i => i.cat === currentCategory);
  }
  if (searchQuery.trim() !== "") {
    items = items.filter(i => i.name.toLowerCase().includes(searchQuery) || i.desc.toLowerCase().includes(searchQuery));
  }

  if(items.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;"><div class="icon">🔍</div><p>No matching items found.</p></div>`;
    return;
  }

  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
      <div class="product-img">
        <img src="${item.img || 'https://images.unsplash.com/photo-1472851294608-062f824d29cc?w=400'}" alt="${item.name}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><text y=%2250%%22 x=%2250%%22 font-size=%2240%22 text-anchor=%22middle%22 alignment-baseline=%22middle%22>${item.emoji}</text></svg>'"/>
      </div>
      <div class="product-info">
        <span class="product-cat-badge">${item.cat}</span>
        <div class="product-name">${item.emoji} ${item.name}</div>
        <div class="product-desc">${item.desc || 'Premium selected item quality.'}</div>
        <div class="product-footer">
          <span class="product-price">${item.price.toLocaleString()} ETB</span>
          <button class="add-cart" onclick="addToCart('${item.id}')">Add +</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
  
  // Keep admin tracking views updated in sync
  renderAdminProducts();
}

// Shopping Cart Core Operations
function addToCart(id) {
  cart.push(id);
  updateCartUI();
  // Simple intuitive bounce effect logic to the cart layout indicator
  const cartBtn = document.querySelector('.cart-btn');
  cartBtn.style.transform = "scale(1.08)";
  setTimeout(() => cartBtn.style.transform = "scale(1)", 150);
}

function removeFromCart(index) {
  cart.splice(index, 1);
  updateCartUI();
}

function updateCartUI() {
  document.getElementById('cartCount').innerText = cart.length;
  const body = document.getElementById('cartBody');
  
  if (cart.length === 0) {
    body.innerHTML = `<div class="empty-cart">🛒 Your cart is completely empty. Add products to get started.</div>`;
    document.getElementById('cartTotalText').innerText = "0 ETB";
    return;
  }

  let total = 0;
  body.innerHTML = cart.map((id, index) => {
    const item = products[id];
    if(!item) return '';
    total += item.price;
    return `
      <div class="cart-item">
        <span class="cart-item-emoji">${item.emoji}</span>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">${item.price.toLocaleString()} ETB</div>
        </div>
        <button class="cart-item-remove" onclick="removeFromCart(${index})">🗑️</button>
      </div>
    `;
  }).join('');
  
  document.getElementById('cartTotalText').innerText = total.toLocaleString() + " ETB";
}

// Overlay Drawer Displays Control
function toggleCart(open) {
  document.getElementById('cartDrawer').classList.toggle('open', open);
  document.getElementById('overlay').classList.toggle('open', open);
}

function toggleAdmin(open) {
  document.getElementById('adminPanel').classList.toggle('open', open);
}

function closeAllDrawers() {
  toggleCart(false);
  toggleAdmin(false);
}

// Checkout Form Windows Logic
function openCheckoutModal() {
  if(cart.length === 0) {
    alert("Please add items to your cart before proceeding.");
    return;
  }
  toggleCart(false);
  document.getElementById('checkoutModal').classList.add('open');
  
  let total = cart.reduce((sum, id) => sum + (products[id]?.price || 0), 0);
  document.getElementById('modalTotalPay').innerText = `Total Due: ${total.toLocaleString()} ETB (inc. VAT & markup)`;
}

function closeCheckoutModal() {
  document.getElementById('checkoutModal').classList.remove('open');
}

function submitFinalOrder() {
  const name = document.getElementById('orderName').value.trim();
  const phone = document.getElementById('orderPhone').value.trim();
  const address = document.getElementById('orderAddress').value.trim();

  if(!name || !phone || !address) {
    alert("Please completely fill out delivery confirmation forms.");
    return;
  }

  // Generate simple receipt summary
  let total = cart.reduce((sum, id) => sum + (products[id]?.price || 0), 0);
  alert(`Thank you ${name}! Your order has been placed successfully.\n\nTotal: ${total.toLocaleString()} ETB.\nOur support team will contact you shortly at ${phone}.`);
  
  // Wipe parameters state clean
  cart = [];
  updateCartUI();
  closeCheckoutModal();
}

// Live Internal Mock Admin Backend Panel Mechanics
function switchAdminTab(tabName) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
  
  document.getElementById(`tab-${tabName}`).classList.add('active');
  document.getElementById(`sec-${tabName}`).classList.add('active');
}

function renderAdminProducts() {
  const list = document.getElementById('adminProductList');
  list.innerHTML = Object.keys(products).map(id => `
    <div class="admin-item">
      <div class="admin-item-info">
        <strong>${products[id].emoji} ${products[id].name}</strong>
        <span>Category: ${products[id].cat} | Price: ${products[id].price} ETB</span>
      </div>
      <button class="del-btn" onclick="deleteProductItem('${id}')">🗑️ Delete</button>
    </div>
  `).join('');
}

function addNewProductItem() {
  const name = document.getElementById('addName').value.trim();
  const cat = document.getElementById('addCat').value;
  const basePrice = parseFloat(document.getElementById('addPrice').value);
  const img = document.getElementById('addImg').value.trim();
  const emoji = document.getElementById('addEmoji').value.trim() || "📦";

  if(!name || isNaN(basePrice)) {
    alert("Please provide valid product descriptions and numbers.");
    return;
  }

  const newId = "custom_" + Date.now();
  products[newId] = {
    name: name,
    cat: cat,
    price: Math.round(basePrice * 1.15), // Auto calculate standard 15% system markup
    emoji: emoji,
    img: img || "https://images.unsplash.com/photo-1472851294608-062f824d29cc?w=400",
    desc: "Custom live memory inventory item."
  };

  // Reset inputs
  document.getElementById('addName').value = "";
  document.getElementById('addPrice').value = "";
  document.getElementById('addImg').value = "";
  document.getElementById('addEmoji').value = "";

  renderProducts();
  switchAdminTab('inventory');
}

function deleteProductItem(id) {
  if(confirm("Are you sure you want to completely drop this item from layout?")) {
    delete products[id];
    renderProducts();
  }
}
</script>
